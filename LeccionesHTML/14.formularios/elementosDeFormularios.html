<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form action="">
    <h3>Elemento Select</h3>

    <label for="autos">Escoge una marca:</label>
    <select name="autos" id="autos" size="3" multiple>
      <option value="toyota">Toyota</option>
      <option value="renault" >Renault</option>
      <!-- Selected para mostrar opcion por defecto -->
      <option value="honda" selected>Honda</option>  
      <option value="honda">Subaru</option>
    </select>
    
  </form>

    <h3>textArea</h3>
    <form action="">
      <textarea name="" id="" rows="10" cols="30"></textarea><br>
      <button >Enviar Datos</button>
    </form>
    <hr>

    <h3>fieldSet & legend</h3>
    <form action="">
      <fieldset>
        <legend>Datos Personales</legend>
        <label for="">Nombre:</label><br>
        <input type="text" name="" id=""> <br>

        <label for="">Apellido:</label><br>
        <input type="text" name="" id=""> <br>

        <label for="">Edad:</label><br>
        <input type="text" name="" id=""> <br>

        <label for="">Contraseña</label><br>
        <input type="password"> <br>
        <input type="color" name="" id="">
        <input type="reset" name="" id="">

        <button>Envia datos</button>
      </fieldset>
    </form>


</body>
</html>
