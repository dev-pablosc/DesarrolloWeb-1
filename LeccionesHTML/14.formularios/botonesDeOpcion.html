<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h3>Radio Button</h3>
  <p>Escoge tu lenguaje de programacion favorito</p>

  <form>
    <input type="radio" value="Python" id="python" name="lenguaje">
    <label for="python">Python</label><br>

    <input type="radio" value="Java" id="java" name="lenguaje">
    <label for="java">Java</label><br>

    <input type="radio" value="JavaScript" id="js" name="lenguaje">
    <label for="js">JavaScript</label><br>
    <input type="submit" value="Enviar Formulario">
  </form>

  <h3>Casilla de verificacion</h3>
  <p>Mi medio de transporte favorito es:</p>
  <form >
    <input type="checkbox" name="medio1" id="medio1" value="Moto" >
    <label for="medio1">Me gusta mas la Moto</label> <br>

    <input type="checkbox" name="medio2" id="medio2" value="Auto">
    <label for="medio2">Prefiero un Auto</label> <br>

    <input type="checkbox" name="medio3" id="medio3" value="Caminar">
    <label for="medio3">Me gusta mas Caminar</label> <br>
    <input type="submit" value="Enviar ">
  </form>

  <h3>Boton de enviar</h3>
  <form>
    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" placeholder="Ingresa tu nombre"> <br>

    <label for="apellido">Apellido:</label> <br>
    <input type="text" name="" id="apellido" placeholder="Ingresa tu apellido"> <br>

    <input type="submit" value="Enviar ">



  </form>

</body>
</html>
