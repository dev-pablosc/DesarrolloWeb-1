<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas</title>
  <style>
    table, th, td {
      border:1px solid black;
  }
  </style>
</head>
<body>
  <h2>Una tabla basica</h2>
  <table>
    <!--tr es la fila-->
    <tr>
      <!--th son los encabezados-->
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Nota</th>
    </tr>
    <tr>
      <td>Pablo</td>
      <td>Sanchez</td>
      <td>80</td>
    </tr>
    <tr>
      <td>Carlos</td>
      <td>Ortega</td>
      <td>90</td>
    </tr>
  </table>
</body>
</html>
