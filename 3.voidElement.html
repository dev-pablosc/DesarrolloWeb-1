  <h1>Void Elements</h1>

  <!-- Br se utiliza para dar saltos de linea -->
  <h2>Etiqueta br</h2>
  <p>La etiqueta &lt br &gt <br> da un salto <br> de linea</p>
  
  <!-- linea que divide el contenido -->

  <h2>Etiqueta hr</h2>
  <p>Esta etiqueta &lt hr &gt dibuja una linea para dividir el contenido</p>
